name: Feature request
description: Propose a scoped improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Publication risk or maintainer problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: false_positives
    attributes:
      label: Expected false-positive risks
    validations:
      required: true
