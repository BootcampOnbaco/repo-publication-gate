name: Bug report
description: Report incorrect behavior or a false negative.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Never include real secrets, credentials, private repository content, or personal data.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS and Python version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Safe minimal reproduction
      description: Use synthetic placeholders only.
    validations:
      required: true
