name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e .

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Publication gate
        run: repo-gate . --fail-on high --format markdown --output publication-gate-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: publication-gate-report-${{ matrix.python-version }}
          path: publication-gate-report.md
          if-no-files-found: ignore
